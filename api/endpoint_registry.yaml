        response_model_needed: true
      - method: GET
        path: /api/portfolios/{portfolio_code}/daily-files
        name: get_portfolio_daily_files
        safety: read_only
        chatbot_tool: true
      - method: GET
        path: /api/files/{file_id}/transactions
        name: get_file_transactions
        safety: read_only
        chatbot_tool: true
      - method: PUT
        path: /api/transactions/{transaction_id}
        name: update_transaction
        safety: controlled_write
        chatbot_tool: false
        request_model_needed: true
      - method: GET
        path: /api/transactions/all
        name: list_all_transactions
