        chatbot_tool: true
        response_model_present: true

  upload_and_files:
    target_router: api/routers/uploads.py
    endpoints:
      - method: POST
        path: /api/data/bulk-upload
        name: bulk_upload_data
        safety: controlled_write
        chatbot_tool: false
      - method: POST
        path: /api/upload
        name: upload_trading_file
        safety: controlled_write
        chatbot_tool: false
      - method: GET
        path: /api/files
        name: list_files
        safety: read_only
        chatbot_tool: true
      - method: GET
        path: /api/data/{filename}
