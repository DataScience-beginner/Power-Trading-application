version: 1
updated_at: "2026-07-11"
purpose: >
  Enterprise endpoint registry for humans, agents, chatbots, tests, and refactors.
  Every API route should be listed here with ownership, intent, safety level,
  response contract status, and future router placement.

governance:
  source_code_current: api/main.py
  target_architecture: api/routers/*
  openapi_source: FastAPI generated /openapi.json
  rule: Update this file whenever an endpoint is added, removed, renamed, or materially changed.
  pydantic_policy:
    request_models_required_for: ["POST", "PUT", "PATCH"]
    response_models_required_for_new_endpoints: true
    endpoint_docstrings_required: true
    route_summary_required: true
    route_description_required: true
  safety_levels:
    read_only: Safe for chatbot/agent read tools.
    controlled_write: Requires validation and audit logging.
    destructive: Requires explicit human/admin approval.
    external_dependency: Calls external network/API or requires external service.

domains:
  web_pages:
    target_router: api/routers/web.py
    endpoints:
      - method: GET
        path: /
        name: serve_frontend_or_api_root
        safety: read_only
        chatbot_tool: false
      - method: GET
        path: /parser
        name: serve_parser_page
        safety: read_only
        chatbot_tool: false
      - method: GET
        path: /energy-schedule
        name: serve_energy_schedule_page
        safety: read_only
        chatbot_tool: false

  health:
    target_router: api/routers/health.py
    endpoints:
      - method: GET
        path: /api/health
        name: health_check
        safety: read_only
        chatbot_tool: true
        response_model_needed: true

  admin:
    target_router: api/routers/admin.py
    endpoints:
      - method: POST
        path: /api/admin/login
        name: admin_login
        safety: controlled_write
        chatbot_tool: false
        request_model_present: true
        response_model_present: true
      - method: GET
        path: /api/admin/me
        name: get_current_admin_profile
        safety: read_only
        chatbot_tool: false
      - method: GET
        path: /api/admin/tables
        name: list_admin_tables
        safety: read_only
        chatbot_tool: false
      - method: GET
        path: /api/admin/table/{table_name}
        name: get_admin_table_rows
        safety: read_only
        chatbot_tool: false
      - method: POST
        path: /api/admin/reset-database
        name: reset_database
        safety: destructive
        chatbot_tool: false

  workbook_auth:
    target_router: api/routers/workbooks.py
    endpoints:
