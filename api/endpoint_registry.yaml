        chatbot_tool: false
        response_model_present: true
      - method: POST
        path: /api/v1/auth/users
        name: register_user
        safety: controlled_write
        chatbot_tool: false
        request_model_present: true
        response_model_present: true
      - method: POST
        path: /api/v1/auth/change-password
        name: change_authenticated_password
        safety: controlled_write
        chatbot_tool: false
        request_model_present: true
        response_model_present: true
      - method: POST
        path: /api/v1/auth/recover-admin
