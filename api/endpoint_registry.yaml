        request_model_present: true
        response_model_present: true

  chatbot:
    target_router: api/routers/chatbot.py
    contract_version: chatbot-v1
    notes:
      - Client and portfolio scope derives from JWT/database membership, never question text.
      - Groq llama-3.1-8b-instant is optional narration; deterministic tools remain authoritative.
      - Forecast, mutation, bid, trade, credential, prompt, and arbitrary SQL requests are blocked.
    endpoints:
      - method: POST
        path: /api/v1/chat/conversations
        name: start_conversation
        safety: controlled_write
        chatbot_tool: false
        request_model_present: true
        response_model_present: true

  identity:
    target_router: api/routers/identity.py
    contract_version: identity-v1
    notes:
      - Admin and client portals share one identity service but enforce database roles server-side.
      - Recovery responses resist account enumeration; codes are hashed, single-use, rate-limited, and expire in ten minutes.
      - Password recovery revokes active sessions and records security events.
      - Email SMTP and SMS webhook delivery fail closed until environment credentials are configured.
    endpoints:
      - method: POST
        path: /api/v1/identity/login
        name: role_aware_login
        safety: controlled_write
        chatbot_tool: false
        request_model_present: true
        response_model_present: true
      - method: POST
        path: /api/v1/identity/recovery/request
        name: request_account_recovery
        safety: controlled_write
        chatbot_tool: false
        request_model_present: true
        response_model_present: true
      - method: POST
        path: /api/v1/identity/recovery/confirm
        name: confirm_account_recovery
        safety: controlled_write
        chatbot_tool: false
        request_model_present: true
        response_model_present: true
      - method: GET
        path: /api/v1/chat/conversations
        name: conversations
        safety: read_only
        chatbot_tool: false
        response_model_present: true
      - method: GET
        path: /api/v1/chat/conversations/{conversation_id}
        name: conversation
        safety: read_only
        chatbot_tool: false
        response_model_present: true
      - method: POST
        path: /api/v1/chat/conversations/{conversation_id}/messages
        name: send_message
        safety: controlled_write
        chatbot_tool: false
        request_model_present: true
        response_model_present: true

  ai_forecasting:
    target_router: api/routers/forecasting.py
    contract_version: solar-forecast-v1
    notes:
      - JWT client and portfolio scope is mandatory; platform administrators may access all tenants.
      - Open-Meteo weather and generation history feed a calibrated physical baseline with P10/P50/P90.
      - Synthetic fallback and demo histories are explicitly labelled and never presented as actual observations.
      - Forecasts are read-only decision support and cannot place bids, trades, or schedule changes.
    endpoints:
      - method: POST
        path: /api/v1/forecasts/solar/run
        name: run_solar_generation_forecast
        safety: controlled_write
        chatbot_tool: true
        request_model_present: true
        response_model_present: true
      - method: GET
        path: /api/v1/forecasts/solar/latest
        name: read_latest_solar_generation_forecast
        safety: read_only
        chatbot_tool: true
        response_model_present: true
      - method: POST
        path: /api/v1/admin/demo/provision
        name: provision_multi_tenant_demo
        safety: controlled_write
        chatbot_tool: false
        request_model_present: true
        response_model_present: true

refactor_backlog:
  - Split api/main.py into routers by domain.
  - Move Pydantic request/response models into api/schemas/.
  - Move business logic from route functions into services.
  - Add response_model to chatbot-safe read endpoints.
  - Add route summary and description for all active endpoints.
  - Consolidate duplicate /api/energy-schedule/days route.
  - Add deterministic integration tests for each router.
