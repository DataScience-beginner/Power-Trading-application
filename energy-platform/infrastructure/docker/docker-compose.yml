services:
  client-web:
    build:
      context: ../../apps/client-web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    image: localhost/${CONTAINER_IMAGE_PREFIX:-energy-platform}/client-web:latest
    ports:
      - "${WEB_PORT:-4173}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  excel-consumption-service:
    build:
      context: ../../services/excel-consumption-service
      dockerfile: Dockerfile
    image: localhost/${CONTAINER_IMAGE_PREFIX:-energy-platform}/excel-consumption-service:latest
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      EXCEL_CONSUMPTION_DATABASE_URL: ${EXCEL_CONSUMPTION_CONTAINER_DATABASE_URL:-sqlite:////app/data/excel_consumption.db}
      EXCEL_CONSUMPTION_UPLOAD_DIR: ${EXCEL_CONSUMPTION_CONTAINER_UPLOAD_DIR:-/app/data/uploads}
      EXCEL_CONSUMPTION_ALLOWED_ORIGINS: ${EXCEL_CONSUMPTION_ALLOWED_ORIGINS:-["http://localhost:4173"]}
      EXCEL_CONSUMPTION_JWT_SECRET: ${EXCEL_CONSUMPTION_JWT_SECRET}
      EXCEL_CONSUMPTION_DEFAULT_TENANT: ${EXCEL_CONSUMPTION_DEFAULT_TENANT:-demo-tenant}
    volumes:
      - excel_consumption_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  prometheus:
    profiles: ["observability"]
    image: docker.io/prom/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    profiles: ["observability"]
    image: docker.io/grafana/grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro

volumes:
  excel_consumption_data:
