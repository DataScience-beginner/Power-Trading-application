<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Trading Data - Enterprise Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
            text-align: center;
        }

        .header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }

        .upload-section {
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
        }

        .upload-section:hover {
            border-color: #764ba2;
            background: #f8f9ff;
        }

        .upload-section.dragover {
            background: #e8ebff;
            border-color: #764ba2;
        }

        .file-input {
            display: none;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.2s;
            margin: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .status.loading {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .data-view {
            display: none;
        }

        .data-view.active {
            display: block;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .summary-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
        }

        .summary-card h3 {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .summary-card .value {
            font-size: 2em;
            font-weight: bold;
        }

        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f8f9ff;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
        }

        .tab {
            padding: 15px 30px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1em;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
            font-weight: 600;
        }

        .tab:hover {
            color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .metadata-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .metadata-item {
            padding: 15px;
            background: #f8f9ff;
            border-radius: 8px;
        }

        .metadata-item label {
            font-weight: 600;
            color: #667eea;
            display: block;
            margin-bottom: 5px;
        }

        .metadata-item value {
            color: #333;
            font-size: 1.1em;
        }

        /* Tooltip styles */
        .tooltip-container {
            position: relative;
            display: inline-block;
        }

        .info-icon {
            display: inline-block;
            width: 20px;
            height: 20px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            text-align: center;
            line-height: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: help;
            margin-left: 10px;
            vertical-align: middle;
        }

        .tooltip-text {
            visibility: hidden;
            width: 400px;
            background-color: #333;
            color: #fff;
            text-align: left;
            border-radius: 8px;
            padding: 15px;
            position: absolute;
            z-index: 1000;
            bottom: 125%;
            left: 50%;
            margin-left: -200px;
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 13px;
            line-height: 1.6;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .tooltip-text::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }

        .tooltip-container:hover .tooltip-text,
        .info-icon:hover + .tooltip-text {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ Power Trading Data Platform</h1>
            <p>Enterprise-Level Excel Parser & Analytics Dashboard</p>
        </div>

        <div class="card">
            <h2>📤 Upload Excel File</h2>
            <div class="upload-section" id="dropZone">
                <div class="icon">📁</div>
                <h3>Drag & Drop Excel File Here</h3>
                <p>or</p>
                <button class="btn" onclick="document.getElementById('fileInput').click()">
                    Choose File
                </button>
                <input type="file" id="fileInput" class="file-input" accept=".xls,.xlsx">
                <p style="margin-top: 15px; color: #666;">
                    <small>Supported formats: .xls, .xlsx (IEX GDAM Trading Reports)</small>
                </p>
            </div>

            <div id="status" class="status"></div>
        </div>

        <div id="dataView" class="data-view card">
            <h2>📊 Parsed Trading Data</h2>
            
            <div class="summary-grid" id="summaryGrid"></div>

            <div class="tabs">
                <button class="tab active" onclick="showTab('metadata')">📋 Metadata</button>
                <button class="tab" onclick="showTab('buy')">📈 Buy Transactions</button>
                <button class="tab" onclick="showTab('sell')">📉 Sell Transactions</button>
                <button class="tab" onclick="showTab('charges')">💰 Charges</button>
            </div>

            <div id="metadata" class="tab-content active"></div>
            <div id="buy" class="tab-content"></div>
            <div id="sell" class="tab-content"></div>
            <div id="charges" class="tab-content"></div>

            <div style="margin-top: 20px; text-align: center;">
                <button class="btn" onclick="downloadJSON()">💾 Download JSON</button>
                <button class="btn" onclick="resetForm()">🔄 Upload Another File</button>
            </div>
        </div>
    </div>

    <script>
        let currentData = null;

        // Drag and drop functionality
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => {
                dropZone.classList.add('dragover');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => {
                dropZone.classList.remove('dragover');
            }, false);
        });

        dropZone.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles(files);
        }, false);

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        async function handleFiles(files) {
            if (files.length === 0) return;

            const file = files[0];
            
            // Case-insensitive file extension check
            const fileName = file.name.toLowerCase();
            if (!fileName.endsWith('.xls') && !fileName.endsWith('.xlsx')) {
                showStatus('error', '❌ Please upload an Excel file (.xls or .xlsx)');
                return;
            }

            showStatus('loading', '⏳ Parsing file... Please wait');

            const formData = new FormData();
            formData.append('file', file);

            try {
                console.log('📤 Uploading file:', file.name);
                
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                console.log('📥 Response status:', response.status);

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('❌ Server error:', errorText);
                    throw new Error(`Server returned ${response.status}: ${errorText}`);
                }

                const result = await response.json();
                console.log('✅ Parse result:', result.success);

                if (result.success) {
                    currentData = result.data;
                    showStatus('success', `✅ File parsed successfully! ${result.message}`);
                    displayData(result.data);
                } else {
                    showStatus('error', `❌ Error: ${result.detail || 'Unknown error'}`);
                }
            } catch (error) {
                console.error('❌ Upload error:', error);
                showStatus('error', `❌ Error uploading file: ${error.message}`);
            }
        }

        function showStatus(type, message) {
            const status = document.getElementById('status');
            status.className = `status ${type}`;
            status.textContent = message;
        }

        function displayData(data) {
            document.getElementById('dataView').classList.add('active');

            const summary = data.summary || {};
            const metadata = data.metadata || {};
            const reportType = metadata.report_type || '';
            const isSCH = reportType.includes('Scheduling');
            
            // Display summary cards
            const remarks = metadata.remarks || '';
            const remarksHtml = remarks ? `
                <div class="tooltip-container">
                    <span class="info-icon" title="Remarks">i</span>
                    <div class="tooltip-text">${remarks}</div>
                </div>
            ` : '';
            
            if (isSCH) {
                // SCH format summary
                document.getElementById('summaryGrid').innerHTML = `
                    <div class="summary-card">
                        <h3>Scheduling Date ${remarksHtml}</h3>
                        <div class="value">${metadata.scheduling_date || metadata.trading_date || 'N/A'}</div>
                    </div>
                    <div class="summary-card">
                        <h3>Total Slots</h3>
                        <div class="value">${summary.total_scheduling_slots || 0}</div>
                    </div>
                    <div class="summary-card">
                        <h3>Net Interface (After Losses)</h3>
                        <div class="value" style="color: ${(summary.net_interface_mwh || 0) >= 0 ? '#38a169' : '#e53e3e'}">
                            ${(summary.net_interface_mwh || 0) >= 0 ? '+' : ''}${(summary.net_interface_mwh || 0).toLocaleString('en-IN', {maximumFractionDigits: 2})} MWh
                        </div>
                    </div>
                    <div class="summary-card">
                        <h3>Total Losses</h3>
                        <div class="value" style="color: #c62828;">
                            ${((summary.total_losses_mwh || 0)).toLocaleString('en-IN', {maximumFractionDigits: 2})} MWh
                        </div>
                    </div>
                    <div class="summary-card">
                        <h3>Portfolio</h3>
                        <div class="value" style="font-size: 0.9em;">${metadata.portfolio_name || 'N/A'}</div>
                    </div>
                `;
            } else {
                // GDAM/RTM/DOR format summary
                document.getElementById('summaryGrid').innerHTML = `
                    <div class="summary-card">
                        <h3>Trading Date ${remarksHtml}</h3>
                        <div class="value">${metadata.trading_date || 'N/A'}</div>
                    </div>
                    <div class="summary-card">
                        <h3>Buy Transactions</h3>
                        <div class="value">${summary.total_buy_transactions || 0}</div>
                    </div>
                    <div class="summary-card">
                        <h3>Sell Transactions</h3>
                        <div class="value">${summary.total_sell_transactions || 0}</div>
                    </div>
                    <div class="summary-card">
                        <h3>Funds Payin/Payout</h3>
                        <div class="value" style="color: ${(summary.funds_payin_payout || 0) >= 0 ? '#38a169' : '#e53e3e'}">
                            ${(summary.funds_payin_payout || 0) >= 0 ? '+' : ''}₹${(summary.funds_payin_payout || 0).toLocaleString('en-IN', {maximumFractionDigits: 2})}
                        </div>
                    </div>
                `;
            }

            // Display metadata
            displayMetadata(metadata);
            
            if (isSCH) {
                // Display scheduling transactions
                displaySchedulingTransactions(data.scheduling_transactions || []);
            } else {
                // Display buy/sell transactions
                displayTransactions('buy', data.buy_transactions || []);
                displayTransactions('sell', data.sell_transactions || []);
            }
            
            // Display charges (not applicable for SCH but keep for compatibility)
            if (!isSCH) {
                displayCharges(data.charges || {});
            }

            // Scroll to data view
            document.getElementById('dataView').scrollIntoView({ behavior: 'smooth' });
        }

        function displayMetadata(metadata) {
            const html = `
                <div class="metadata-grid">
                    <div class="metadata-item">
                        <label>Trading Date:</label>
                        <value>${metadata.trading_date || 'N/A'}</value>
                    </div>
                    <div class="metadata-item">
                        <label>Delivery Date:</label>
                        <value>${metadata.delivery_date || 'N/A'}</value>
                    </div>
                    <div class="metadata-item">
                        <label>Entity ID:</label>
                        <value>${metadata.entity_id || 'N/A'}</value>
                    </div>
                    <div class="metadata-item">
                        <label>Entity Name:</label>
                        <value>${metadata.entity_name || 'N/A'}</value>
                    </div>
                    <div class="metadata-item">
                        <label>Portfolio Code:</label>
                        <value>${metadata.portfolio_code || 'N/A'}</value>
                    </div>
                    <div class="metadata-item">
                        <label>Portfolio Name:</label>
                        <value>${metadata.portfolio_name || 'N/A'}</value>
                    </div>
                    <div class="metadata-item">
                        <label>Report Type:</label>
                        <value>${metadata.report_type || 'N/A'}</value>
                    </div>
                </div>
            `;
            document.getElementById('metadata').innerHTML = html;
        }

        function displayTransactions(type, transactions) {
            const container = document.getElementById(type);
            
            if (transactions.length === 0) {
                container.innerHTML = '<p>No transactions found</p>';
                return;
            }

            let tableHTML = '<div class="table-container"><table><thead><tr>';
            
            if (type === 'buy') {
                tableHTML += `
                    <th>Date</th>
                    <th>Time Slot</th>
                    <th>Quantity (MW)</th>
                    <th>Rate (₹/MWh)</th>
                    <th>Amount (₹)</th>
                `;
            } else {
                tableHTML += `
                    <th>Date</th>
                    <th>Time Slot</th>
                    <th>Solar (MW)</th>
                    <th>Non-Solar (MW)</th>
                    <th>Hydro (MW)</th>
                    <th>Total (MW)</th>
                    <th>Rate (₹/MWh)</th>
                    <th>Amount (₹)</th>
                `;
            }
            
            tableHTML += '</tr></thead><tbody>';

            transactions.forEach(trans => {
                tableHTML += '<tr>';
                if (type === 'buy') {
                    tableHTML += `
                        <td>${trans.date || formatDate(trans.time_block_start)}</td>
                        <td>${trans.time_slot || formatTime(trans.time_block_start)}</td>
                        <td>${trans.quantity_mw.toFixed(2)}</td>
                        <td>₹${trans.rate_per_mwh.toLocaleString('en-IN', {maximumFractionDigits: 2})}</td>
                        <td>₹${trans.amount.toLocaleString('en-IN', {maximumFractionDigits: 2})}</td>
                    `;
                } else {
                    tableHTML += `
                        <td>${trans.date || formatDate(trans.time_block_start)}</td>
                        <td>${trans.time_slot || formatTime(trans.time_block_start)}</td>
                        <td>${trans.solar_quantity_mw.toFixed(2)}</td>
                        <td>${trans.non_solar_quantity_mw.toFixed(2)}</td>
                        <td>${trans.hydro_quantity_mw.toFixed(2)}</td>
                        <td>${trans.total_quantity_mw.toFixed(2)}</td>
                        <td>₹${trans.rate_per_mwh.toLocaleString('en-IN', {maximumFractionDigits: 2})}</td>
                        <td>₹${trans.amount.toLocaleString('en-IN', {maximumFractionDigits: 2})}</td>
                    `;
                }
                tableHTML += '</tr>';
            });

            tableHTML += '</tbody></table></div>';
            container.innerHTML = tableHTML;
        }

        function displaySchedulingTransactions(transactions) {
            const container = document.getElementById('buy');  // Reuse buy container for scheduling data
            
            if (transactions.length === 0) {
                container.innerHTML = '<p>No scheduling transactions found.</p>';
                // Hide sell and charges tabs for SCH
                document.getElementById('sell').innerHTML = '<p>Not applicable for scheduling reports.</p>';
                document.getElementById('charges').innerHTML = '<p>Not applicable for scheduling reports.</p>';
                return;
            }

            let tableHTML = `
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th rowspan="2">Date</th>
                                <th rowspan="2">Time Slot</th>
                                <th colspan="4" style="background-color: #1976d2; border: 2px solid #0d47a1; text-align: center; color: white; font-weight: bold;">
                                    Regional Periphery (Without Losses)
                                </th>
                                <th colspan="4" style="background-color: #f57c00; border: 2px solid #e65100; text-align: center; color: white; font-weight: bold;">
                                    Interface Point (After Losses)
                                </th>
                                <th colspan="3" style="background-color: #c2185b; border: 2px solid #880e4f; text-align: center; color: white; font-weight: bold;">
                                    Transmission Losses
                                </th>
                            </tr>
                            <tr>
                                <th style="background-color: #1976d2; color: white;">Injection (MW)</th>
                                <th style="background-color: #1976d2; color: white;">Drawal (MW)</th>
                                <th style="background-color: #1976d2; color: white;">Net (MW)</th>
                                <th style="background-color: #1976d2; color: white; font-size: 0.85em;">Scheduled (MW)</th>
                                <th style="background-color: #f57c00; color: white;">Injection (MW)</th>
                                <th style="background-color: #f57c00; color: white;">Drawal (MW)</th>
                                <th style="background-color: #f57c00; color: white;">Net (MW)</th>
                                <th style="background-color: #f57c00; color: white; font-size: 0.85em;">Scheduled (MW)</th>
                                <th style="background-color: #c2185b; color: white;">Injection (MW)</th>
                                <th style="background-color: #c2185b; color: white;">Drawal (MW)</th>
                                <th style="background-color: #c2185b; color: white;">Total (MW)</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            transactions.forEach(trans => {
                const regionalNetColor = trans.regional_net_mw >= 0 ? '#38a169' : '#e53e3e';
                const interfaceNetColor = trans.interface_net_mw >= 0 ? '#38a169' : '#e53e3e';
                const lossesColor = (trans.total_losses_mw || 0) !== 0 ? '#c62828' : '#666';
                
                tableHTML += `
                    <tr>
                        <td>${trans.date || formatDate(trans.time_block_start)}</td>
                        <td>${trans.time_slot || formatTime(trans.time_block_start)}</td>
                        <td style="background-color: #f5f9ff;">${trans.regional_injection_mw.toFixed(2)}</td>
                        <td style="background-color: #f5f9ff;">${trans.regional_drawal_mw.toFixed(2)}</td>
                        <td style="background-color: #f5f9ff; color: ${regionalNetColor}; font-weight: bold;">
                            ${trans.regional_net_mw >= 0 ? '+' : ''}${trans.regional_net_mw.toFixed(2)}
                        </td>
                        <td style="background-color: #f5f9ff; font-size: 0.85em;">${trans.regional_injection_mw.toFixed(2)}</td>
                        <td style="background-color: #fffaf5;">${trans.interface_injection_mw.toFixed(2)}</td>
                        <td style="background-color: #fffaf5;">${trans.interface_drawal_mw.toFixed(2)}</td>
                        <td style="background-color: #fffaf5; color: ${interfaceNetColor}; font-weight: bold;">
                            ${trans.interface_net_mw >= 0 ? '+' : ''}${trans.interface_net_mw.toFixed(2)}
                        </td>
                        <td style="background-color: #fffaf5; font-size: 0.85em;">${(trans.net_scheduled_mw || trans.interface_net_mw).toFixed(2)}</td>
                        <td style="background-color: #fff5f8; color: ${lossesColor}; font-weight: bold;">
                            ${(trans.injection_losses_mw || 0).toFixed(2)}
                        </td>
                        <td style="background-color: #fff5f8; color: ${lossesColor}; font-weight: bold;">
                            ${(trans.drawal_losses_mw || 0).toFixed(2)}
                        </td>
                        <td style="background-color: #fff5f8; color: ${lossesColor}; font-weight: bold;">
                            ${(trans.total_losses_mw || 0).toFixed(2)}
                        </td>
                    </tr>
                `;
            });

            tableHTML += '</tbody></table></div>';
            container.innerHTML = tableHTML;
            
            // Hide sell and charges tabs for SCH
            document.getElementById('sell').innerHTML = '<p>Not applicable for scheduling reports.</p>';
            document.getElementById('charges').innerHTML = '<p>Not applicable for scheduling reports.</p>';
        }

        function displayCharges(charges) {
            const container = document.getElementById('charges');
            
            // Format charge value with sign indicator
            const formatCharge = (value) => {
                if (!value || value === 0) return '₹0';
                const sign = value < 0 ? '-' : '+';
                const color = value < 0 ? '#e53e3e' : '#38a169';
                return `<span style="color: ${color}">${sign}₹${Math.abs(value).toLocaleString('en-IN')}</span>`;
            };
            
            const formulas = charges.formulas || {};
            
            const html = `
                <div class="metadata-grid">
                    <div class="metadata-item" style="grid-column: 1 / -1; background: ${charges.funds_payin_payout >= 0 ? '#38a169' : '#e53e3e'}; color: white;">
                        <label style="color: white; font-weight: bold;">Funds Payin/Payout:</label>

                    </div>
                    <div class="metadata-item tooltip-container">
                        <label>NLDC Application Fee:

                    <div class="metadata-item tooltip-container">

                        <value>₹${charges.stu_transmission_charges?.toLocaleString('en-IN') || '0'}</value>
                    </div>
                    <div class="metadata-item">
                        <label>Distribution Charges:</label>
                        <value>₹${charges.distribution_charges?.toLocaleString('en-IN') || '0'}</value>
                    </div>
                    <div class="metadata-item tooltip-container">
                        <label>SLDC Scheduling Charges:
                            ${formulas.sldc_scheduling_charges ? `<span class="info-icon">i</span><div class="tooltip-text">${formulas.sldc_scheduling_charges}</div>` : ''}

                    <div class="metadata-item">

                    </div>
                    <div class="metadata-item">
                        <label>Fees:</label>
                        <value>₹${charges.fees?.toLocaleString('en-IN') || '0'}</value>

                    <div class="metadata-item">
                        <label>IGST:</label>

                    <div class="metadata-item">

                    </div>
                    <div class="metadata-item">
                        <label>UTGST:</label>
                        <value>₹${charges.utgst?.toLocaleString('en-IN') || '0'}</value>
                    </div>
                    <div class="metadata-item" style="grid-column: 1 / -1; background: #667eea; color: white;">
                        <label style="color: white;">Total Charges:</label>
                        <value style="font-size: 1.5em;">₹${charges.total_charges?.toLocaleString('en-IN') || '0'}</value>
                    </div>
                </div>
            `;
            
            container.innerHTML = html;
        }

        function formatDateTime(dateStr) {
            if (!dateStr) return 'N/A';
            return new Date(dateStr).toLocaleString('en-IN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'N/A';
            return new Date(dateStr).toLocaleDateString('en-IN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            });
        }

        function formatTime(dateStr) {
            if (!dateStr) return 'N/A';
            return new Date(dateStr).toLocaleTimeString('en-IN', {
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function showTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        function downloadJSON() {
            if (!currentData) return;
            
            const dataStr = JSON.stringify(currentData, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `trading_data_${new Date().getTime()}.json`;
            link.click();
            URL.revokeObjectURL(url);
        }

        function resetForm() {
            document.getElementById('dataView').classList.remove('active');
            document.getElementById('status').className = 'status';
            document.getElementById('fileInput').value = '';
            currentData = null;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
