name: Security and Supply Chain Gate

on:
  pull_request:
  push:
    branches:
      - develop
      - staging
      - V2
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    name: Secret and dependency checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Check tracked artifact hygiene
        run: |
          test -z "$(git ls-files | grep -E '(^|/)(\.env($|\.)|.*\.(db|pid|log|zip))$|(^|/)(node_modules|dist|__pycache__|\.pytest_cache)/' || true)"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python audit tooling
        run: python -m pip install --upgrade pip pip-audit cyclonedx-bom && python -m pip install -r requirements-dev.txt

      - name: Audit Python dependencies
        run: pip-audit -r requirements.txt

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json

      - name: Audit frontend dependencies
        working-directory: frontend-react
        run: |
          npm ci
          npm audit --audit-level=high

      - name: Run security phase gate
        run: python scripts/quality/security_phase_gate.py

      - name: Generate software bills of materials
        run: |
          mkdir -p test-results
          cyclonedx-py requirements requirements.txt --output-format JSON --output-file test-results/python-sbom.json
          cd frontend-react
          npm sbom --sbom-format cyclonedx > ../test-results/frontend-sbom.json

      - name: Upload security evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: security-evidence-${{ github.sha }}
          path: test-results/**
          if-no-files-found: ignore
