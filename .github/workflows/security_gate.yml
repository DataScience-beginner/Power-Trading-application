name: Security and Supply Chain Gate

on:
  pull_request:
  push:
    branches:
      - develop
      - staging
      - V2
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    name: Secret and dependency checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Check tracked artifact hygiene
        run: |
          test -z "$(git ls-files | grep -E '(^|/)(\.env($|\.)|.*\.(db|pid|log|zip))$|(^|/)(node_modules|dist|__pycache__|\.pytest_cache)/' || true)"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python audit tooling
        run: python -m pip install --upgrade pip pip-audit

      - name: Audit Python dependencies
        run: pip-audit -r requirements.txt

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json

      - name: Audit frontend dependencies
        working-directory: frontend-react
        run: |
          npm ci
          npm audit --audit-level=high
