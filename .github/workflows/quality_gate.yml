name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - develop
      - staging
      - V2
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Golden rigorous quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json

      - name: Install Python test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt

      - name: Install frontend dependencies
        working-directory: frontend-react
        run: npm ci

      - name: Run rigorous golden gate
        env:
          ENVIRONMENT: ci
          AUTO_LOAD_MOCK_DATA: "false"
          ENABLE_DATABASE_RESET: "false"
        run: python scripts/quality/golden_test.py --mode rigorous

      - name: Upload test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-${{ github.sha }}
          path: |
            .coverage
            test-results/**
          if-no-files-found: ignore
