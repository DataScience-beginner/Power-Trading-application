name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - develop
      - staging
      - V2
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Golden rigorous quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json

      - name: Install Python test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt

      - name: Install frontend dependencies
        working-directory: frontend-react
        run: npm ci

      - name: Run rigorous golden gate
        env:
          ENVIRONMENT: ci
          AUTO_LOAD_MOCK_DATA: "false"
          ENABLE_DATABASE_RESET: "false"
        run: python scripts/quality/golden_test.py --mode rigorous

      - name: Upload test evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: quality-${{ github.sha }}
          path: |
            .coverage
            test-results/**
          if-no-files-found: ignore

  promote-staging:
    name: Promote exact tested commit to staging
    needs: quality
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/develop' &&
      needs.quality.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out the tested commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Promote exact commit to staging
        run: |
          git config user.name "innowatt-release-bot"
          git config user.email "release-bot@users.noreply.github.com"
          git push origin "HEAD:staging"
