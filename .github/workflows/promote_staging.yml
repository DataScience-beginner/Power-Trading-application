name: Promote DEV to TEST

on:
  workflow_run:
    workflows: ["Quality Gate"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: promote-staging
  cancel-in-progress: false

jobs:
  promote:
    name: Promote the tested commit to staging
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'develop'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out the exact tested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Promote exact commit to staging
        run: |
          git config user.name "innowatt-release-bot"
          git config user.email "release-bot@users.noreply.github.com"
          git push origin "HEAD:staging"
