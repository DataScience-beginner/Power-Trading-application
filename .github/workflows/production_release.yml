name: Production Release Approval

on:
  push:
    branches:
      - V2
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-release
  cancel-in-progress: false

jobs:
  production-approval:
    name: Cofounder-approved production gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json

      - name: Install test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt

      - name: Install frontend dependencies
        working-directory: frontend-react
        run: npm ci

      - name: Run release rigorous gate
        env:
          ENVIRONMENT: ci
          AUTO_LOAD_MOCK_DATA: "false"
          ENABLE_DATABASE_RESET: "false"
        run: python scripts/quality/golden_test.py --mode rigorous

      - name: Record release identity
        run: |
          printf 'commit=%s\nbranch=%s\nworkflow=%s\n' \
            "$GITHUB_SHA" "$GITHUB_REF_NAME" "$GITHUB_RUN_ID" \
            > release-evidence.txt

      - name: Upload release evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: production-release-${{ github.sha }}
          path: release-evidence.txt
