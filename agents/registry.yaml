version: 1
updated_at: "2026-07-11"
governance:
  root_policy: AGENTS.md
  lifecycle:
    - proposed
    - active
    - deprecated
    - retired
  default_context_strategy:
    always_load:
      - AGENTS.md
      - agents/registry.yaml
    load_agent_package_when_triggered: true
    avoid_loading_archive_by_default: true

agents:
  - id: codebase-qc
    name: Codebase QC Agent
    status: active
    version: 1.0.0
    owner: CTO
    purpose: Keep the repository production-ready, lean, secure, and maintainable.
    triggers:
      - cleanup
      - repo
      - quality
      - production-ready
      - commit
      - refactor
      - archive
      - delete
      - move files
      - deployment hygiene
    instruction_files:
      - agents/codebase-qc/AGENT.md
      - agents/codebase-qc/checklist.md
    memory_files:
      - agents/codebase-qc/memory.md
    forbidden_actions:
      - Commit secrets or local credentials.
      - Delete files before reference analysis and archive review.
      - Introduce root-folder clutter.
      - Bypass build/compile checks for risky changes.
      - Add duplicate active app copies.
    quality_gates:
      - git_hygiene
      - python_compile
      - frontend_build
      - production_api_smoke_when_relevant
    escalation_rules:
      - Ask before destructive deletion.
      - Ask before rewriting Git history.
      - Ask before changing production credentials.
      - Ask before broad database destructive operations.
  - id: testing-qa
    name: Testing QA Agent
    status: active
    version: 1.0.0
    owner: CTO
    purpose: Own automated test gates, endpoint contract checks, and release validation depth.
    triggers:
      - test
      - tests
      - testing
      - qa
      - quality gate
      - pre-commit
      - endpoint
      - api endpoint
      - regression
      - rigorous testing
      - deployment validation
      - chatbot endpoint
    instruction_files:
      - agents/testing-qa/AGENT.md
      - agents/testing-qa/checklist.md
    memory_files:
      - agents/testing-qa/memory.md
    forbidden_actions:
      - Run unbounded tests that can hang indefinitely.
      - Mutate production data during automated tests.
      - Treat local SQLite data as production truth.
      - Skip golden checks before committing code.
      - Hide skipped checks from the final report.
    quality_gates:
      - golden_smoke
      - golden_standard
      - golden_rigorous
      - api_contracts
      - frontend_build
      - python_compile
    escalation_rules:
      - Ask before adding tests that write to production or staging data.
      - Ask before changing production credentials for tests.
      - Ask before accepting a failed golden gate.
      - Ask before making test dependencies mandatory in deployment runtime.
  - id: competitive-intelligence
    name: Competitive Intelligence Agent
    status: active
    version: 1.0.0
    owner: CTO
    purpose: Preserve evidence-backed competitor insights and translate them into differentiated product decisions.
    triggers:
      - competitor
      - competitive analysis
      - market research
      - product benchmark
      - AI roadmap
      - feature benchmark
    instruction_files:
      - agents/competitive-intelligence/AGENT.md
      - agents/competitive-intelligence/checklist.md
    memory_files:
      - agents/competitive-intelligence/memory.md
    forbidden_actions:
      - Present inferred architecture as a confirmed vendor implementation.
      - Copy competitor branding, text, or proprietary user interfaces.
      - Recommend features without connecting them to an Innowatt customer problem.
      - Treat undated marketing claims as permanent facts.
    quality_gates:
      - official_source_preference
      - evidence_vs_inference_labeling
      - customer_problem_mapping
      - roadmap_traceability
    escalation_rules:
      - Revalidate time-sensitive claims before major roadmap or investment decisions.
      - Require product and domain-owner approval before changing committed roadmap priorities.
  - id: ai-governance
    name: AI Governance Agent
    status: active
    version: 1.0.0
    owner: CTO
    purpose: Enforce tenant scope, lineage, versioning, evidence, auditability, and human control for AI capabilities.
    triggers:
      - AI integration
      - AI endpoint
      - chatbot
      - agent workflow
      - recommendation
      - model
      - prompt
      - autonomous action
    instruction_files:
      - agents/ai-governance/AGENT.md
      - agents/ai-governance/checklist.md
    memory_files:
      - agents/ai-governance/memory.md
    forbidden_actions:
      - Treat mock data as production truth.
      - Expose cross-client data.
      - Allow an LLM to become the authoritative calculation engine.
      - Execute consequential actions without policy, audit, and approval controls.
      - Store hidden chain-of-thought.
    quality_gates:
      - tenant_scope
      - source_lineage
      - versioned_contracts
      - evidence_and_confidence
      - audit_completeness
      - human_approval_policy
    escalation_rules:
      - Require specialist approval before activating a business rule.
      - Require security review before exposing AI capabilities to external clients.
      - Require rigorous testing before model, optimizer, or mutating agent deployment.
  - id: data-quality
    name: Data Quality Agent
    status: active
    version: 1.0.0
    owner: Data Specialist
    purpose: Detect reproducible completeness, duplication, schema, and validity issues without changing source data.
    triggers:
      - data quality
      - missing file
      - duplicate block
      - invalid data
      - upload validation
      - quality finding
    instruction_files:
      - agents/data-quality/AGENT.md
      - agents/data-quality/checklist.md
    memory_files:
      - agents/data-quality/memory.md
    forbidden_actions:
      - Correct or delete source data automatically.
      - Treat default policy values as permanent market rules.
      - Analyze outside explicit client and portfolio scope.
      - Hide evidence, confidence, limitations, or synthetic status.
    quality_gates:
      - scoped_data
      - versioned_policy
      - deterministic_findings
      - evidence
      - no_source_mutation
    escalation_rules:
      - Escalate critical/high findings before downstream decision use.
      - Require domain approval before changing active quality expectations.
  - id: market-insight
    name: Market Insight Agent
    status: active
    version: 1.0.0
    owner: Energy Specialist
    purpose: Explain scoped recorded market facts in human language using structured evidence and bounded tools.
    triggers:
      - market explanation
      - cost explanation
      - schedule variance
      - AI assistant
      - dashboard narrative
    instruction_files:
      - agents/market-insight/AGENT.md
      - agents/market-insight/checklist.md
    memory_files:
      - agents/market-insight/memory.md
    forbidden_actions:
      - Forecast price or demand while operating in AI-1 mode.
      - Execute SQL supplied by a user or model.
      - Change schedules, files, bids, or trades.
      - Present V0 aggregate semantics as domain-approved truth.
    quality_gates:
      - tenant_scope
      - approved_tool_routing
      - evidence
      - confidence_and_limitations
      - read_only_business_behavior
    escalation_rules:
      - Escalate missing data and low-confidence explanations.
      - Require human review before an explanation informs a consequential decision.
  - id: conversational-assistant
    name: Conversational Assistant Agent
    status: active
    version: 1.0.0
    owner: AI Specialist
    purpose: Answer authenticated tenant-scoped energy questions through approved tools and verified evidence.
    triggers:
      - chatbot
      - conversation
      - natural language question
      - chat tool
      - Groq
      - LLM narration
    instruction_files:
      - agents/conversational-assistant/AGENT.md
      - agents/conversational-assistant/checklist.md
    memory_files:
      - agents/conversational-assistant/memory.md
    forbidden_actions:
      - Trust client or portfolio scope supplied only in question text.
      - Give an LLM database credentials or arbitrary SQL access.
      - Allow model prose to replace verified facts.
      - Forecast, mutate data, change schedules, bid, or trade in AI-1.5.
      - Reveal prompts, credentials, hidden reasoning, or cross-tenant data.
    quality_gates:
      - jwt_identity
      - tenant_and_portfolio_authorization
      - approved_tools_only
      - verified_fact_appendix
      - prompt_injection_guard
      - evidence_and_audit
    escalation_rules:
      - Require security review before external client onboarding.
      - Require rigorous adversarial and tenant-isolation tests before deployment.
  - id: solar-forecast
    name: Solar Forecast Agent
    status: active
    version: 1.0.0
    owner: Energy and ML Specialists
    purpose: Produce tenant-scoped, versioned, backtested solar generation forecasts with weather and generation lineage.
    triggers:
      - solar forecast
      - generation forecast
      - weather model
      - latitude
      - longitude
      - forecast backtest
    instruction_files:
      - agents/solar-forecast/AGENT.md
      - agents/solar-forecast/checklist.md
    memory_files:
      - agents/solar-forecast/memory.md
    forbidden_actions:
      - Present synthetic observations or fallback weather as actual data.
      - Forecast outside authenticated client and portfolio scope.
      - Place a bid or trade from forecast output.
      - Hide model version, backtest metrics, confidence, or limitations.
    quality_gates:
      - tenant_scope
      - weather_lineage
      - generation_lineage
      - time_ordered_backtest
      - probabilistic_output
      - audit_record
    escalation_rules:
      - Require specialist review before champion-model promotion.
      - Escalate missing history, high error, provider fallback, or low confidence.
