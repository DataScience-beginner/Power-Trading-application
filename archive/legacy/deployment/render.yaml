services:
  - type: web
    name: power-trading-app
    env: python
    region: singapore
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      cd frontend-react && npm install && npm run build && cd ..
      python init_database.py
      python generate_mock_reports.py
      python upload_mock_reports.py
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: power-trading-db
          property: connectionString
    disk:
      name: power-trading-disk
      mountPath: /app/data
      sizeGB: 1

databases:
  - name: power-trading-db
    databaseName: powertrading
    user: powertrading_user
    plan: free
